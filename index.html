<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM Research Tool</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; padding: 2rem; }
  .container { max-width: 800px; margin: 0 auto; }
  h1 { font-size: 24px; font-weight: 500; margin-bottom: 4px; }
  p.sub { font-size: 14px; color: #888; margin-bottom: 1.5rem; }
  .search-row { display: flex; gap: 10px; margin-bottom: 1rem; }
  input { flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #e0e0e0; font-size: 15px; outline: none; }
  input:focus { border-color: #555; }
  button { padding: 10px 20px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #e0e0e0; font-size: 14px; cursor: pointer; }
  button:hover { background: #222; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .chip { font-size: 12px; padding: 4px 12px; border-radius: 100px; border: 1px solid #333; color: #888; cursor: pointer; background: transparent; }
  .chip:hover { color: #e0e0e0; border-color: #555; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 1rem 1.25rem; }
  .card.full { grid-column: 1 / -1; }
  .card-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: #555; margin-bottom: 10px; }
  .card-body { font-size: 13px; color: #ccc; line-height: 1.7; }
  .card-body ul { padding-left: 1.1rem; }
  .card-body li { margin-bottom: 4px; }
  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 6px; background: #1a3a2a; color: #4ade80; font-weight: 500; margin-right: 8px; }
  #loading { text-align: center; padding: 2rem; color: #555; display: none; }
  #error { color: #f87171; font-size: 14px; margin-bottom: 1rem; display: none; }
  #results { display: none; }
</style>
</head>
<body>
<div class="container">
  <h1>PM Research Tool</h1>
  <p class="sub">Enter any product or app name to get instant PM insights</p>
  <div class="search-row">
    <input type="text" id="inp" placeholder="e.g. Zepto, Notion, Swiggy..." />
    <button id="btn" onclick="analyze()">Analyze</button>
  </div>
  <div class="chips">
    <span class="chip" onclick="quick('Zepto')">Zepto</span>
    <span class="chip" onclick="quick('Notion')">Notion</span>
    <span class="chip" onclick="quick('Swiggy')">Swiggy</span>
    <span class="chip" onclick="quick('CRED')">CRED</span>
    <span class="chip" onclick="quick('Meesho')">Meesho</span>
    <span class="chip" onclick="quick('PhonePe')">PhonePe</span>
  </div>
  <div id="error"></div>
  <div id="loading">Analyzing...</div>
  <div id="results" class="grid"></div>
</div>
<script>
  document.getElementById('inp').addEventListener('keydown', e => { if (e.key === 'Enter') analyze(); });
  function quick(name) { document.getElementById('inp').value = name; analyze(); }

  async function analyze() {
    const product = document.getElementById('inp').value.trim();
    if (!product) return;
    document.getElementById('error').style.display = 'none';
    document.getElementById('results').style.display = 'none';
    document.getElementById('loading').style.display = 'block';
    document.getElementById('btn').disabled = true;

    try {
      const res = await fetch('/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ product })
      });
      const d = await res.json();
      if (d.error) throw new Error(d.error);
      render(product, d);
    } catch(e) {
      document.getElementById('error').textContent = 'Error: ' + e.message;
      document.getElementById('error').style.display = 'block';
    } finally {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('btn').disabled = false;
    }
  }

  function li(arr) { return '<ul>' + arr.map(x => '<li>' + x + '</li>').join('') + '</ul>'; }

  function render(product, d) {
    document.getElementById('results').innerHTML = `
      <div class="card full" style="display:flex;align-items:center;">
        <span class="badge">Analysis complete</span>
        <span style="font-size:17px;font-weight:500;">${product}</span>
      </div>
      <div class="card"><div class="card-label">User pain points</div><div class="card-body">${li(d.pain_points)}</div></div>
      <div class="card"><div class="card-label">Competitors</div><div class="card-body">${li(d.competitors)}</div></div>
      <div class="card"><div class="card-label">KPIs to track</div><div class="card-body">${li(d.kpis)}</div></div>
      <div class="card"><div class="card-label">Feature recommendation</div><div class="card-body">${d.feature}</div></div>
      <div class="card full"><div class="card-label">Summary</div><div class="card-body">${d.summary}</div></div>`;
    document.getElementById('results').style.display = 'grid';
  }
</script>
</body>
</html>
